name: CI / Fly Deploy

# Run tests on PRs and pushes; deploy only on pushes to the default branch.
# NOTE: this repo's current branch is `main` — `master` is included too.
on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch: {}

# Cancel an in-progress run for the same ref if a newer commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter Python file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - 'app/**/*.py'
            deploy:
              - 'app/**/*.py'
              - 'app/Dockerfile'
              - 'app/fly.toml'
              - 'app/gunicorn.conf.py'
              - 'app/pyproject.toml'
              - 'app/uv.lock'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [changes]
    # Only run on pushes AND when a Python file under app/ changed.
    if: github.event_name == 'push' && needs.changes.outputs.python == 'true'
    # The app (pyproject.toml, tests/) lives in the app/ subdirectory.
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [changes]
    # Only run on pushes AND when a Python file under app/ changed.
    if: github.event_name == 'push' && needs.changes.outputs.python == 'true'
    # The app (pyproject.toml, tests/) lives in the app/ subdirectory.
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest

  deploy:
    name: Deploy to Fly.io
    # Only deploy after tests pass, and only on pushes (not PRs).
    needs: [lint, test, changes]
    # Only deploy on pushes to the default branch AND when a deploy-relevant
    # file under app/ changed (Python, Dockerfile, fly.toml, deps, etc.).
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
